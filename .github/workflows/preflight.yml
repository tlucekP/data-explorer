name: preflight

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Guard against invalid Playwright CLI install command
        run: |
          ! git grep -nE "run:\\s*npx --yes @playwright/cli install-browser" -- .github/workflows

      - name: Install Playwright Chromium for UI checks
        run: npx --yes playwright install --with-deps chromium

      - name: Run preflight
        run: bash tools/preflight.sh
